<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Super Croissant Fighter</title>
    <style>
        html {
            background: #111;
            color-scheme: dark;
        }

        body {
            align-items: center;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            margin: 0;
            min-height: 100vh;
            padding: clamp(1rem, 4vw, 3rem);
        }

        canvas {
            aspect-ratio: 3 / 2;
            background: #000;
            border: 1px solid #333;
            display: block;
            height: auto;
            max-width: 960px;
            width: 100%;
        }

        .game-note {
            box-sizing: border-box;
            color: #ccc;
            font: 14px/1.5 system-ui, sans-serif;
            max-width: 960px;
            padding: 0.75rem 0;
            width: 100%;
        }

        a { color: #b7e46c; }
    </style>
</head>
<body>
    <canvas id="webgl" width="960" height="640"></canvas>
    <script src="scf.js"></script>
    <div class="game-note">
        Click in the game to enable audio.
        <a href="https://drive.google.com/file/d/19kRkef_s1bcm71RYweQxQVqKjv7cZAJK/view?usp=sharing">Windows build</a>
        (definitely not a virus; don't worry at all, no viruses here!).
    </div>
</body>
</html>
